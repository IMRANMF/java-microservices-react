services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    # ◄ ADD THIS HEALTHCHECK BLOCK FOR RABBITMQ
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ecom-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - ecom-network

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    networks:
      - ecom-network
    depends_on:
      rabbitmq:
        condition: service_healthy # ◄ Wait for full readiness

  order-service:
    build: ./order_service
    ports:
      - "8081:8081"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/order_db
    networks:
      - ecom-network
    depends_on:
      rabbitmq:
        condition: service_healthy # ◄ Wait for full readiness
      mongodb:
        condition: service_started

  inventory-service:
    build: ./inventory_service
    ports:
      - "8082:8082"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/inventory_db
    networks:
      - ecom-network
    depends_on:
      rabbitmq:
        condition: service_healthy # ◄ Wait for full readiness
      mongodb:
        condition: service_started

  notification-service:
    build: ./notification_service
    ports:
      - "8083:8083"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
    networks:
      - ecom-network
    depends_on:
      rabbitmq:
        condition: service_healthy # ◄ Wait for full readiness

  frontend:
    build: ./e-commerce-frontend
    ports:
      - "3000:3000"
    networks:
      - ecom-network
    depends_on:
      - gateway-service

networks:
  ecom-network:
    driver: bridge
    